<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="navbar">

    <style>

        .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#2c3e50;
        padding:15px 40px;
        color:white;
        }

        .logo{
        font-size:22px;
        font-weight:bold;
        }

        .nav-links a{
        text-decoration:none;
        color:white;
        margin-left:20px;
        font-size:16px;
        }

        .nav-links a:hover{
        color:#00d4ff;
        }

    </style>

    <div class="navbar">

        <div class="logo">My Spring App</div>

        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About Us</a>
            <a th:href="@{/contact}">Contact Us</a>
            <a th:href="@{/login}">SignIn</a>
            <a th:href="@{/signup}">Signup</a>
        </div>

    </div>

</div>

</body>
</html>
