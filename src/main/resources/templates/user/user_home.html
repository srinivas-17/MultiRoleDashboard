<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>User Control Panel</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Top Navigation Bar */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 30px;
            background:#2c3e50;
            color:white;
        }

        /* Left Title */
        .navbar h2{
            font-size:22px;
        }

        /* Right Section */
        .nav-right{
            display:flex;
            align-items:center;
            gap:20px;
        }

        /* Username */
        .username{
            font-size:16px;
        }

        /* Logout Button */
        .logout-btn{
            background:#e74c3c;
            border:none;
            padding:8px 16px;
            color:white;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#c0392b;
        }

        /* Page Content */
        .content{
            padding:40px;
            text-align:center;
        }

        .content h1{
            color:#333;
        }

        /* Responsive */
        @media(max-width:600px){

            .navbar{
                flex-direction:column;
                align-items:flex-start;
                gap:10px;
            }

            .nav-right{
                width:100%;
                justify-content:space-between;
            }
        }

    </style>

</head>

<body>

<!-- Top Header -->
<div class="navbar">

    <h2>User Control Panel</h2>

    <div class="nav-right">
        <span class="username">
            Welcome, <b th:text="${#authentication.name}"></b>
        </span>

        <form th:action="@{/admin/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

</div>

<!-- Page Content -->
<div class="content">
    <h1>Welcome to the User Dashboard</h1>
    <p>Manage your application from here.</p>
</div>

</body>
</html>
