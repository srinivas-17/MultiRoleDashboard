<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* Global Reset to ensure fragments don't have weird gaps */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#1f4037,#99f2c8);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Keeps footer at bottom if content is short */
        }

        /* Signup Card Container */
        .container {
            flex: 1; /* Pushes footer down */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Crucial for width: 100% */
        }

        .signup-btn {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .signup-btn:hover {
            background: #1e8449;
        }

        .error {
            color: #e74c3c;
            background: #fdeaea;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }

        @media(max-width:500px){
            .card { width: 85%; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <div class="card">
        <h2>Create Account</h2>

        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/signup}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required placeholder="email@example.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required placeholder="Min 6 characters">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" th:field="*{confirmPassword}" required>
            </div>

            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/login}">Login</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
